steps:
  - script: npx vitest run --coverage.enabled --coverage.reporter=json-summary
    displayName: Run tests with coverage

  - script: npx qualink collect coverage-js --input coverage/coverage-summary.json
    displayName: Report JS coverage
    env:
      ELASTIC_URL: $(ELASTIC_URL)
      ELASTIC_API_KEY: $(ELASTIC_API_KEY)
      QUALINK_CATEGORY: frontend
      QUALINK_TAGS: frontend,coverage
