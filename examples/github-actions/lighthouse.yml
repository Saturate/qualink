# Option A: install once (better when running multiple collectors)
#  - run: npm install -g qualink

# Option B: use npx per step (simpler for a single collector)
#   Just prefix commands with: npx qualink

steps:
  - run: npx lhci collect --url=https://staging.example.com

  - run: npx qualink collect lighthouse --input .lighthouseci/lhr-*.json
    env:
      ELASTIC_URL: ${{ secrets.ELASTIC_URL }}
      ELASTIC_API_KEY: ${{ secrets.ELASTIC_API_KEY }}
      QUALINK_CATEGORY: frontend
      QUALINK_TAGS: frontend,performance
