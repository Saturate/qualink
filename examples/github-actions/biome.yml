steps:
  - run: npx biome check src/ --reporter=json > biome-report.json

  - run: npx qualink collect biome --input biome-report.json
    env:
      ELASTIC_URL: ${{ secrets.ELASTIC_URL }}
      ELASTIC_API_KEY: ${{ secrets.ELASTIC_API_KEY }}
      QUALINK_CATEGORY: frontend
      QUALINK_TAGS: frontend,biome
