steps:
  - run: npx vitest run --coverage.enabled --coverage.reporter=json-summary

  - run: npx qualink collect coverage-js --input coverage/coverage-summary.json
    env:
      ELASTIC_URL: ${{ secrets.ELASTIC_URL }}
      ELASTIC_API_KEY: ${{ secrets.ELASTIC_API_KEY }}
      QUALINK_CATEGORY: frontend
      QUALINK_TAGS: frontend,coverage
